spring:
  application:
    name: backend
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/freshmart_db
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080