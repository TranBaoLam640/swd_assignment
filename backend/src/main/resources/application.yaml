spring:
  application:
    name: backend
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/freshmart_db
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: "sa12345"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-env-before-production}
    expiration-ms: 3600000 # 1 hour

  # Where the backend redirects the browser back to after VNPAY's Return
  # URL is processed — the React dev server by default.
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

  vnpay:
    # Register a free sandbox merchant account at https://sandbox.vnpayment.vn
    # to get your own tmn-code + hash-secret — never commit real values here,
    # override via env vars or application-local.yaml instead.
    tmn-code: ${VNPAY_TMN_CODE:CHANGE_ME}
    hash-secret: ${VNPAY_HASH_SECRET:CHANGE_ME}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    # Must be a URL VNPAY's servers can reach — localhost only works if
    # tunnelled (e.g. ngrok) during local testing.
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payment/vnpay/return}

  order:
    # UC33 alt-flow: if a customer abandons the VNPAY page and neither
    # Return nor IPN ever calls back, an order would otherwise stay
    # PENDING_PAYMENT (and its stock locked) forever. OrderExpiryScheduler
    # expires any order still PENDING_PAYMENT past this many minutes.
    pending-payment-timeout-minutes: ${ORDER_PENDING_PAYMENT_TIMEOUT_MINUTES:2}
    # How often OrderExpiryScheduler checks for stale orders.
    expiry-check-interval-ms: ${ORDER_EXPIRY_CHECK_INTERVAL_MS:60000}
